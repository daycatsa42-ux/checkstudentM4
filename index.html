<script>
  /** ========= GITHUB PAGES CONFIG =========
   * ใส่ URL จาก Google Apps Script Web app ตรงนี้
   * ตัวอย่าง: const API_ENDPOINT = 'https://script.google.com/macros/s/XXXXX/exec';
   */
  const API_ENDPOINT = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE';

  // ทำให้โค้ดเดิมที่เรียก google.script.run ใช้งานบน GitHub Pages ได้
  // โดยไม่ต้องแก้ logic ฟังก์ชันเดิม
  window.google = window.google || {};
  google.script = google.script || {};

  google.script.run = new Proxy({}, {
    get(target, prop) {
      if (prop === 'withSuccessHandler') {
        return function(handler) {
          return createRunner(handler, null);
        };
      }
      if (prop === 'withFailureHandler') {
        return function(handler) {
          return createRunner(null, handler);
        };
      }
      return function(...args) {
        return callApi(String(prop), args, null, null);
      };
    }
  });

  function createRunner(successHandler, failureHandler) {
    return new Proxy({}, {
      get(target, prop) {
        if (prop === 'withSuccessHandler') {
          return function(handler) {
            return createRunner(handler, failureHandler);
          };
        }
        if (prop === 'withFailureHandler') {
          return function(handler) {
            return createRunner(successHandler, handler);
          };
        }
        return function(...args) {
          return callApi(String(prop), args, successHandler, failureHandler);
        };
      }
    });
  }

  async function callApi(action, args, successHandler, failureHandler) {
    if (!API_ENDPOINT || API_ENDPOINT.includes('PASTE_YOUR')) {
      const err = new Error('ยังไม่ได้ใส่ API_ENDPOINT ในไฟล์ index.html');
      if (failureHandler) failureHandler(err);
      else console.error(err);
      return;
    }

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify({ action, args })
      });

      const data = await res.json();

      if (!data || data.ok === false) {
        throw new Error(data && data.error ? data.error : 'API error');
      }

      if (successHandler) successHandler(data.result);

    } catch (err) {
      // สำรองด้วย JSONP ในกรณี browser/server บล็อก CORS
      callApiJsonp(action, args)
        .then(result => {
          if (successHandler) successHandler(result);
        })
        .catch(finalErr => {
          if (failureHandler) failureHandler(finalErr);
          else console.error(finalErr);
        });
    }
  }

  function callApiJsonp(action, args) {
    return new Promise((resolve, reject) => {
      const cb = '__gas_cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const script = document.createElement('script');
      const sep = API_ENDPOINT.includes('?') ? '&' : '?';

      window[cb] = function(data) {
        cleanup();
        if (!data || data.ok === false) reject(new Error(data && data.error ? data.error : 'API error'));
        else resolve(data.result);
      };

      function cleanup() {
        delete window[cb];
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = function() {
        cleanup();
        reject(new Error('เชื่อมต่อ API ไม่สำเร็จ'));
      };

      script.src = API_ENDPOINT + sep + 'action=' + encodeURIComponent(action) +
        '&args=' + encodeURIComponent(JSON.stringify(args)) +
        '&callback=' + encodeURIComponent(cb);

      document.body.appendChild(script);
    });
  }

  const defaultConfig = {
    school_name:'โรงเรียนหนองหานวิทยา',
    grade_level:'มัธยมศึกษาปีที่ 4',
    present_text:'มา',
    absent_text:'ขาด',
    leave_text:'ลา',
    save_button_text:'บันทึกข้อมูล'
  };

    const tabs = ['home','backdate','report','status','edit'];
    const idx = tabs.indexOf(page);

    document.getElementById(page + 'Page').classList.add('active');
    document.querySelector('.nav-btn:nth-child(' + (idx + 1) + ')').classList.add('active');

    if (page === 'report') initReportFilters();
    if (page === 'status') initStatusFilters();
    if (page === 'edit') initEditFilters();
    if (page === 'backdate') initBackdateFilters();

  function initRoomGrid(){
    const grid = document.getElementById('roomGrid');
    grid.innerHTML = '';

    rooms.forEach(room => {
      const card = document.createElement('div');
      card.className = 'room-card';
      card.onclick = () => openAttendance(room);

      card.innerHTML = `
        <div class="room-icon">🏫</div>
        <div class="room-name">${room}</div>
      `;

      grid.appendChild(card);
    });
  }

  function openAttendance(room){
  currentRoom = room;
  currentAttendance = {};

  document.getElementById('currentRoom').textContent = room;
  document.getElementById('attendanceDate').value = new Date().toISOString().slice(0,10);

  const dateISO = document.getElementById('attendanceDate').value;

  google.script.run
    .withSuccessHandler(res => {
      if (res && res.ok && res.exists) {
        showToast('⚠️ วันนี้ห้องนี้เช็คแล้ว หากต้องการแก้ไขให้ไปที่เมนูแก้ไข','#dd6b20');
        showPage('edit');

        setTimeout(() => {
          const editRoom = document.getElementById('editRoom');
          const editDate = document.getElementById('editDate');

          if (editRoom) editRoom.value = room;
          if (editDate) editDate.value = dateISO;
        }, 300);

        return;
      }

      google.script.run
        .withSuccessHandler(sts => {
          currentStudents = sts || [];
          renderStudentList(currentStudents);
          showPage('attendance');
        })
        .withFailureHandler(e => {
          console.error(e);
          showToast('❌ โหลดรายชื่อนักเรียนไม่สำเร็จ','#e53e3e');
        })
        .getStudents(room);
    })
    .withFailureHandler(err => {
      console.error(err);
      showToast('❌ ตรวจสอบสถานะการเช็คชื่อไม่สำเร็จ','#e53e3e');
    })
    .checkAttendanceExists(dateISO, room);
}

  function renderStudentList(students){
    const wrap = document.getElementById('studentList');
    wrap.innerHTML = '';

    students.forEach(st => {
      const div = document.createElement('div');
      div.className = 'student-item';

      div.innerHTML = `
        <div class="student-info">
          <div class="student-no">${st.no}</div>
          <div class="student-name">${st.name}</div>
        </div>

        <div class="status-buttons">
          <button class="status-btn present" onclick="setStatus(${st.no},'M')" data-student="${st.no}" data-status="present">${defaultConfig.present_text}</button>
          <button class="status-btn absent" onclick="setStatus(${st.no},'K')" data-student="${st.no}" data-status="absent">${defaultConfig.absent_text}</button>
          <button class="status-btn leave" onclick="setStatus(${st.no},'L')" data-student="${st.no}" data-status="leave">${defaultConfig.leave_text}</button>
        </div>
      `;

      wrap.appendChild(div);
    });
  }

  function setStatus(no, s){
    currentAttendance[no] = s;

    document.querySelectorAll(`[data-student="${no}"]`).forEach(b => b.classList.remove('active'));

    const map = {
      M:'present',
      K:'absent',
      L:'leave'
    };

    const active = document.querySelector(`[data-student="${no}"][data-status="${map[s]}"]`);

    if (active) active.classList.add('active');
  }

  function markAll(s){
    if (!currentStudents.length) return;

    currentStudents.forEach(st => setStatus(st.no, s));

    showToast(`✅ ตั้งค่า ${s === 'M' ? 'มาทั้งหมด' : s === 'K' ? 'ขาดทั้งหมด' : 'ลาทั้งหมด'} แล้ว`);
  }

  function clearAll(){
    currentAttendance = {};
    document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
    showToast('🧹 ล้างสถานะทั้งหมดแล้ว','#718096');
  }

  function saveAttendance(){
    const btn = document.getElementById('saveBtn');
    const total = currentStudents.length;
    const checked = Object.keys(currentAttendance).length;

    if (checked < total) {
      showToast(`⚠️ เช็คยังไม่ครบ (เหลือ ${total - checked} คน)`,'#dd6b20');
      return;
    }

    const dateISO = document.getElementById('attendanceDate').value || new Date().toISOString().slice(0,10);

    btn.disabled = true;
    btn.textContent = 'กำลังบันทึก...';
    btn.style.background = '#cbd5e0';

    const entries = currentStudents.map(s => ({
      no:s.no,
      name:s.name,
      status:currentAttendance[s.no] || 'M'
    }));

    google.script.run
      .withSuccessHandler(res => {
        if (res && res.ok) {
          btn.textContent = '✅ บันทึกสำเร็จแล้ว!';
          btn.style.background = '#38a169';
          showToast(`🎉 บันทึกข้อมูลสำเร็จ ${res.saved} รายการ`);

          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = defaultConfig.save_button_text;
            btn.style.background = '#667eea';
          }, 2000);

        } else {
          btn.disabled = false;
          btn.textContent = defaultConfig.save_button_text;
          btn.style.background = '#667eea';
          showToast('❌ บันทึกไม่สำเร็จ','#e53e3e');
        }
      })
      .withFailureHandler(err => {
        console.error(err);
        btn.disabled = false;
        btn.textContent = defaultConfig.save_button_text;
        btn.style.background = '#667eea';
        showToast('❌ เกิดข้อผิดพลาดระหว่างบันทึก','#e53e3e');
      })
      .saveAttendance(dateISO, currentRoom, entries);
  }

  function initReportFilters(){
    const sel = document.getElementById('reportRoom');
    sel.innerHTML = '<option value="">ทุกห้อง</option>';

    rooms.forEach(r => {
      const o = document.createElement('option');
      o.value = r;
      o.textContent = r;
      sel.appendChild(o);

    const t = new Date();
    const w = new Date();
    w.setDate(t.getDate() - 7);

    document.getElementById('reportStartDate').valueAsDate = w;
    document.getElementById('reportEndDate').valueAsDate = t;

  function generateReport(){
    const room = document.getElementById('reportRoom').value;
    const start = document.getElementById('reportStartDate').value;
    const end = document.getElementById('reportEndDate').value;

    if (!start || !end) {
      showToast('⚠️ กรุณาเลือกช่วงวันที่','#dd6b20');
      return;
    }

    google.script.run
      .withSuccessHandler(res => {
        if (!res || !res.ok || !Array.isArray(res.rows) || !res.rows.length) {
          document.getElementById('reportResults').style.display = 'none';
          showToast('ℹ️ ไม่พบข้อมูลในช่วงที่เลือก','#718096');
          lastReportData = [];
          return;
        }

        lastReportData = res.rows.slice();
        renderReport(res.rows);
      })
      .withFailureHandler(err => {
        console.error(err);
        showToast('❌ สร้างรายงานล้มเหลว','#e53e3e');
      })
      .getReport(room, start, end);

  function renderReport(rows){
    const totalPresent = rows.filter(r => r.status === 'M').length;
    const totalAbsent = rows.filter(r => r.status === 'K').length;
    const totalLeave = rows.filter(r => r.status === 'L').length;
    const total = rows.length;
    const rate = total ? ((totalPresent / total) * 100).toFixed(1) : '0.0';

    document.getElementById('kpiGrid').innerHTML = `
      <div class="kpi-card">
        <div class="kpi-value">${rate}%</div>
        <div class="kpi-label">เปอร์เซ็นต์การมาเรียน</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value">${totalPresent}</div>
        <div class="kpi-label">มาเรียนทั้งหมด</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value">${totalAbsent}</div>
        <div class="kpi-label">ขาดเรียนทั้งหมด</div>
      </div>

      <div class="kpi-card">
        <div class="kpi-value">${totalLeave}</div>
        <div class="kpi-label">ลาทั้งหมด</div>
      </div>
    `;

    const stats = {};

    rows.forEach(r => {
      const k = `${r.room}-${r.student_no}`;

      if (!stats[k]) {
        stats[k] = {
          room:r.room,
          no:r.student_no,
          name:r.student_name,
          present:0,
          absent:0,
          leave:0
        };
      }

      if (r.status === 'M') stats[k].present++;
      else if (r.status === 'K') stats[k].absent++;
      else if (r.status === 'L') stats[k].leave++;
    });

    document.getElementById('reportTable').innerHTML = `
      <thead>
        <tr>
          <th>ห้อง</th>
          <th>เลขที่</th>
          <th>ชื่อ-สกุล</th>

          <th>ขาด</th>
          <th>ลา</th>
        </tr>
      </thead>

        ${Object.values(stats)
          .sort((a,b) => a.room.localeCompare(b.room) || a.no - b.no)
          .map(s => `
            <tr>
              <td>${s.room}</td>
              <td>${s.no}</td>
              <td>${s.name}</td>
              <td style="color:#38a169;font-weight:600">${s.present}</td>
              <td style="color:#e53e3e;font-weight:600">${s.absent}</td>
              <td style="color:#dd6b20;font-weight:600">${s.leave}</td>
            </tr>
          `).join('')}
      </tbody>

    document.getElementById('reportResults').style.display = 'block';
    showToast('✅ สร้างรายงานสำเร็จ');

  function renderDailyTable(rows){

    const byStudent = {};

        byStudent[k] = {
          room:r.room,
          no:r.student_no,
          name:r.student_name,
          att:{}

      byStudent[k].att[r.date] = r.status;

                return `<td style="text-align:center;font-weight:700;font-size:16px;color:${col[s] || '#cbd5e0'}">${sym[s] || '-'}</td>`;
              }).join('')}

      .exportReportCSV(room, start, end);

  function getMondayOfWeek(dateStr){
  const parts = dateStr.split('-');

  const d = new Date(
    Number(parts[0]),
    Number(parts[1]) - 1,
    Number(parts[2])
  );

  const day = d.getDay();

  const diff = day === 0 ? -6 : 1 - day;

  d.setDate(d.getDate() + diff);

  return d;
}

function addDays(date, days){
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function toISODate(date){
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');

  return `${y}-${m}-${d}`;
}

function loadWeeklyStatus(){
  const selectedDate = document.getElementById('statusDate').value || new Date().toISOString().slice(0,10);
  const monday = getMondayOfWeek(selectedDate);

  const weekDates = [
    toISODate(monday),
    toISODate(addDays(monday,1)),
    toISODate(addDays(monday,2)),
    toISODate(addDays(monday,3)),
    toISODate(addDays(monday,4))
  ];

  google.script.run
    .withSuccessHandler(res => {
      if (!res || !res.ok) {
        showToast('❌ โหลดสรุปรายสัปดาห์ไม่สำเร็จ','#e53e3e');
        return;
      }

      renderWeeklyStatus(res.rows || [], weekDates);
    })
    .withFailureHandler(err => {
      console.error(err);
      showToast('❌ โหลดสรุปรายสัปดาห์ไม่สำเร็จ','#e53e3e');
    })
    .getWeeklySubmissionStatus(weekDates);
}

  function formatThaiDay(s){

  function formatDateTH(s){
    if (!s) return '-';

    const d = new Date(s + 'T00:00:00');

    if (isNaN(d)) return s;

    return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear() + 543}`;
